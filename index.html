<div id="scroll-container">
    <div class="track">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>
</div>

<script type="module">
    // In development (local) use the local file, in production (GitHub) use UNPKG
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

    const modulePath = isLocal
        ? '../dist/index.js'
        : 'https://unpkg.com';

    import(modulePath).then(module => {
        const InfiniteScroll = module.default;

        const marquee = new InfiniteScroll('#scroll-container', {
            speed: 50,
            pauseOnMouseEnter: true,
            injectStyles: true
        });

        marquee.init();
    });
</script>

<!-- Custom styles for demo: use your own styles -->
<style>
    #scroll-container {
        .track {
            gap: 10px;

            .item {
                padding: 2px 20px;
                border: 1px solid red;
                border-radius: 5px;
            }
        }
    }
</style>
